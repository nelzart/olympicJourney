<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer votre compte — Olympic Journey | Milano Cortina 2026</title>
  <meta name="description" content="Créez votre compte olympique gratuit Olympic Journey ou connectez-vous pour vivre les Jeux d'hiver Milano Cortina 2026.">

  <script>document.documentElement.classList.add('js');</script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="connexion" class="auth">

  <div data-partial="sprite"></div>

  <main class="auth__screen">
    <a class="auth__logo" href="index.html" aria-label="Accueil Milano Cortina 2026">
      <img src="assets/img/logo-nav.png" alt="Milano Cortina 2026">
    </a>

    <section class="auth-card glass" aria-labelledby="auth-title">
      <header class="auth-card__head">
        <span class="auth-card__avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-4.42 0-8 2.69-8 6v2h16v-2c0-3.31-3.58-6-8-6z"/></svg>
        </span>
        <h1 class="auth-card__title" id="auth-title">Créer votre compte olympique gratuit</h1>

        <div class="auth-social">
          <a class="auth-social__btn" href="#" aria-label="Continuer avec Facebook">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 12a10 10 0 1 0-11.56 9.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.89 3.78-3.89 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99A10 10 0 0 0 22 12z"/></svg>
          </a>
          <a class="auth-social__btn" href="#" aria-label="Continuer avec Google">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.35 11.1H12v3.83h5.35c-.23 1.4-1.64 4.1-5.35 4.1-3.22 0-5.85-2.66-5.85-5.95S8.78 7.15 12 7.15c1.83 0 3.06.78 3.76 1.45l2.56-2.47C16.7 4.6 14.6 3.7 12 3.7 6.96 3.7 2.9 7.76 2.9 12.8s4.06 9.1 9.1 9.1c5.25 0 8.73-3.69 8.73-8.89 0-.6-.07-1.05-.16-1.5z"/></svg>
          </a>
          <a class="auth-social__btn" href="#" aria-label="Continuer avec Apple">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16.36 1.43c.04 1.06-.37 2.08-1.05 2.83-.7.78-1.84 1.38-2.94 1.29-.13-1.03.4-2.12 1.04-2.79.72-.77 1.96-1.34 2.95-1.33zM20.5 17.2c-.55 1.27-.82 1.84-1.53 2.96-.99 1.57-2.39 3.52-4.12 3.53-1.54.02-1.94-1-4.03-.99-2.09.01-2.53 1.01-4.07.99-1.73-.02-3.05-1.78-4.04-3.34C-.3 16.8-.59 11.66 1.13 8.93c1.22-1.94 3.15-3.07 4.96-3.07 1.85 0 3.01 1.01 4.54 1.01 1.48 0 2.39-1.01 4.53-1.01 1.62 0 3.33.88 4.55 2.4-4 2.19-3.35 7.9.79 8.94z"/></svg>
          </a>
        </div>
      </header>

      <div class="auth-divider"><span>Ou</span></div>

      <form class="auth-form" onsubmit="event.preventDefault()">
        <div class="field">
          <label class="field__label" for="auth-email">Email</label>
          <div class="field__control">
            <svg class="field__ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1zm9 7l8-5H4l8 5zm0 2L4 9v8h16V9l-8 5z"/></svg>
            <input class="field__input" id="auth-email" name="email" type="email" autocomplete="email" placeholder="kelyane.royer@ynov.com">
          </div>
        </div>

        <div class="field">
          <label class="field__label" for="auth-pwd">Mot de passe</label>
          <div class="field__control">
            <svg class="field__ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 1a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5zm3 8H9V6a3 3 0 0 1 6 0v3z"/></svg>
            <input class="field__input" id="auth-pwd" name="password" type="password" autocomplete="current-password" placeholder="••••••••••••">
          </div>
        </div>

        <div class="auth-form__row">
          <label class="checkbox">
            <input type="checkbox" name="remember">
            <span>Sauvegarder</span>
          </label>
          <a class="auth-form__forgot" href="#">Mot de passe oublié ?</a>
        </div>

        <button class="btn btn--light auth-form__submit" type="submit">Connexion</button>
      </form>
    </section>

    <p class="auth__copy">© Milano Cortina 2026 — Tous droits réservés</p>
  </main>

  <script src="js/partials.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
